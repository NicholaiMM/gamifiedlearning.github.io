<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f3;
            font-family: Georgia, 'Times New Roman', serif;
            color: #2c2c2c;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: normal;
            letter-spacing: 0.04em;
            color: #3a3a3a;
        }

        header p {
            margin-top: 0.5rem;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: #777;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }

        .portal-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: clamp(200px, 40vw, 280px);
            padding: 2.5rem 1.5rem;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;
            text-decoration: none;
            color: #2c2c2c;
            transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .portal-btn:hover,
        .portal-btn:focus {
            background-color: #f0ede8;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
            outline: none;
        }

        .portal-btn:focus-visible {
            outline: 3px solid #888;
            outline-offset: 3px;
        }

        .portal-btn .btn-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .portal-btn .btn-label {
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            font-weight: bold;
            letter-spacing: 0.02em;
        }

        .portal-btn .btn-sub {
            margin-top: 0.4rem;
            font-size: 0.8rem;
            color: #999;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #bbb;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome</h1>
        <p>Choose a destination below</p>
    </header>

    <nav aria-label="Site portals">
        <a href="/amazinggracehomeliving/" class="portal-btn">
            <span class="btn-icon" aria-hidden="true">🏡</span>
            <span class="btn-label">Amazing Grace Home Living</span>
            <span class="btn-sub">Home &amp; Lifestyle</span>
        </a>
        <a href="/gamifylearning/" class="portal-btn">
            <span class="btn-icon" aria-hidden="true">🎮</span>
            <span class="btn-label">Gamify Learning</span>
            <span class="btn-sub">Interactive Education</span>
        </a>
    </nav>

    <footer>&copy; 2025</footer>
</body>
</html>
