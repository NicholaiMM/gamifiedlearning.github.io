    <style>
        /* Base Styles */
        * { box-sizing: border-box; }
        html { -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #020617;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Loading State */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            animation: pulse 2s ease-in-out infinite;
        }
        .loading-text {
            margin-top: 20px;
            color: #3b82f6;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 900;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes nexus-fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes nexus-zoom-in {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }
        .animate-in.fade-in  { animation: nexus-fade-in 0.3s ease-out both; }
        .animate-in.zoom-in  { animation: nexus-zoom-in 0.3s ease-out both; }
        
        /* Touch Optimizations */
        button, a, [role="button"] {
            touch-action: manipulation;
        }
        
        /* Prevent text selection on game elements */
        .game-grid {
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Performance optimizations */
        .will-change-transform {
            will-change: transform;

        /* Safe area support for notched devices */

                padding-bottom: max(env(safe-area-inset-bottom), 1rem);

<body class="overflow-hidden">
    <!-- Loading Screen -->
    <div id="loading-screen">
        <svg class="loading-logo" viewBox="0 0 100 100">

                <linearGradient id="loadGrad" x1="0%" y1="0%" x2="100%" y2="100%">

    <!-- App-level globals (replace with real Firebase config for production) -->
    <script>
        window.__firebase_config = JSON.stringify({
            apiKey: "AIzaSyDemo-GamifiedLearning",
            authDomain: "gamifiedlearning-demo.firebaseapp.com",
            projectId: "gamifiedlearning-demo",
            storageBucket: "gamifiedlearning-demo.appspot.com",
            messagingSenderId: "000000000000",
            appId: "1:000000000000:web:0000000000000000"
        });
        window.__app_id = 'gamified-learning-v14';
        window.__initial_auth_token = null;
        
        // Hide loading screen when app is ready
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                    setTimeout(() => loadingScreen.remove(), 500);
                }
            }, 800);
        });
    </script>

    <script type="text/babel">
        // ─── React hooks ──────────────────────────────────────────────────────────
        const { useState, useEffect, useRef } = React;

        // ─── Lucide icons ─────────────────────────────────────────────────────────
        const {
            MapPin, Zap, Rocket, Star, Globe, Gamepad2,
            BatteryFull, AlertTriangle, CheckCircle2, Download, ShieldCheck,
            Layout, Code2, FileText, User, TerminalSquare,
            Map: MapIcon, Terminal: TermIcon
        } = LucideReact;

        // ─── Firebase (compat) ────────────────────────────────────────────────────
        let firebaseApp, auth, db;
        try {
            const firebaseConfig = JSON.parse(window.__firebase_config);
            firebaseApp = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth(firebaseApp);
            db   = firebase.firestore(firebaseApp);
        } catch (e) {
            console.warn('Firebase init skipped:', e.message);
        }

        // ─── NEXUS DATA v14.0 ─────────────────────────────────────────────────────
        const NEXUS_DATA = {
            version: "14.0.0",
            codename: "Gamified_Stellara",
            identity: {
                name: "Guardian 82",
                rank: "Gamified Learning Architect",
                bio: "Pioneering the intersection of complex technical infrastructure and gamified user experiences. Translating efficiency architecture into high-integrity educational matrices."
            },
            devops: [
                { name: 'Apps Script', url: 'https://script.google.com/', icon: Code2 },
                { name: 'Google Sites', url: 'https://sites.google.com/', icon: Layout },
                { name: 'GitHub', url: 'https://github.com/NicholaiMM/gamifiedlearning.github.io', icon: Code2 },
                { name: 'Master Resume', url: 'https://docs.google.com/document/d/1Md7lJvMgfmIgyqhg_uIc792TLI98rWkWDIRnqFm0vJk/edit', icon: FileText }
            ]
        };

        // ─── Gamified Logo Component ──────────────────────────────────────────────
        const GamifiedLogo = ({ size = 32 }) => (
            <svg width={size} height={size} viewBox="0 0 100 100" className="drop-shadow-[0_0_10px_#3b82f680]">
                <defs>
                    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor="#3b82f6" />
                        <stop offset="100%" stopColor="#1e40af" />
                    </linearGradient>
                    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor="#fbbf24" />
                        <stop offset="100%" stopColor="#f59e0b" />
                    </linearGradient>
                </defs>
                <path d="M50 5 L90 25 L90 55 C90 75 70 90 50 95 C30 90 10 75 10 55 L10 25 Z" fill="url(#shieldGrad)" stroke="#60a5fa" strokeWidth="2"/>
                <path d="M50 25 L56 40 L72 42 L60 52 L63 68 L50 60 L37 68 L40 52 L28 42 L44 40 Z" fill="url(#starGrad)"/>
            </svg>
        );

        // ─── Tile SVGs for Match-3 Game ───────────────────────────────────────────
        const TileSVGs = {
            0: () => ( // Sun
                <svg viewBox="0 0 24 24" className="w-full h-full text-yellow-500 drop-shadow-[0_0_5px_#eab308]">
                    <circle cx="12" cy="12" r="5" fill="currentColor"/>
                    <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                </svg>
            ),
            1: () => ( // Saturn
                <svg viewBox="0 0 24 24" className="w-full h-full text-yellow-200 drop-shadow-[0_0_5px_#fef08a]">
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-20 12 12)" fill="none" stroke="currentColor" strokeWidth="2"/>
                    <circle cx="12" cy="12" r="6" fill="currentColor"/>
                </svg>
            ),
            2: () => ( // Sparkles
                <svg viewBox="0 0 24 24" className="w-full h-full text-amber-200 drop-shadow-[0_0_5px_#fde68a]">
                    <path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5Z" fill="currentColor"/>
                    <path d="M5 4L5.5 6.5L8 7L5.5 7.5L5 10L4.5 7.5L2 7L4.5 6.5Z" fill="currentColor"/>
                </svg>
            ),
            3: () => ( // Shield Logo
                <svg viewBox="0 0 24 24" className="w-full h-full text-blue-500 drop-shadow-[0_0_5px_#3b82f6]">
                    <path d="M12 2L20 6V12C20 17 16 21 12 22C8 21 4 17 4 12V6L12 2Z" fill="currentColor" opacity="0.8"/>
                    <path d="M12 7L13.5 10.5L17 11L14 13.5L15 17L12 15L9 17L10 13.5L7 11L10.5 10.5Z" fill="#fbbf24"/>
                </svg>
            ),
            4: () => ( // Galaxy Swirl
                <svg viewBox="0 0 24 24" className="w-full h-full text-blue-500 drop-shadow-[0_0_5px_#3b82f6]">
                    <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10c0 1.942-.553 3.754-1.5 5.302l-1.732-1A8 8 0 1 0 12 20c1.782 0 3.425-.583 4.755-1.564l1.155 1.633A9.957 9.957 0 0 1 12 22z" fill="currentColor"/>
                    <path d="M12 18a6 6 0 1 1 6-6 6.007 6.007 0 0 1-1.302 3.755l-1.562-1.25A4 4 0 1 0 12 16a4.004 4.004 0 0 0 2.502-.876l1.25 1.562A6.005 6.005 0 0 1 12 18z" fill="currentColor"/>
                    <circle cx="12" cy="12" r="2" fill="currentColor"/>
                </svg>
            ),
            5: () => ( // Comet
                <svg viewBox="0 0 24 24" className="w-full h-full text-orange-500 drop-shadow-[0_0_5px_#f97316]">
                    <path d="M18.36 5.64c-1.63-1.63-4.52-1.12-6.57.94l-7.3 7.3c-.93.93-1.2 2.37-.58 3.52.4.76 1.14 1.25 1.97 1.34 2.14.22 4.19-1.26 4.9-3.28l.23-.65 7.3-7.3c2.06-2.05 2.57-4.94.94-6.57z" fill="currentColor"/>
                    <path d="M3.5 19.5L2 22l2.5-1.5L3.5 19.5z" fill="#fef08a"/>
                </svg>
            )
        };

        // ─── NavBtn ───────────────────────────────────────────────────────────────
        const NavBtn = ({ active, icon: Icon, label, onClick }) => (
            <button
                onClick={onClick}
                className={`flex flex-col items-center gap-1 px-4 py-2 transition-all rounded-2xl ${active ? 'text-white' : 'text-slate-600'}`}
            >
                <Icon size={20} className={active ? 'text-blue-400' : ''} />
                <span className="text-[7px] font-black uppercase tracking-widest">{label}</span>
            </button>
        );

        // ─── App ──────────────────────────────────────────────────────────────────
        const App = () => {
            const [view,            setView]            = useState('overworld');
            const [user,            setUser]            = useState(null);
            const [points,          setPoints]          = useState(8200);
            const [battery,         setBattery]         = useState(null);
            const [unlockedNodes,   setUnlockedNodes]   = useState(['tpa_node', 'mnl_gateway', 'match3_node']);
            const [certificates,    setCertificates]    = useState([]);
            const [terminalHistory, setTerminalHistory] = useState([
                '[GAMIFIED LEARNING] OS v14.0 Linked.',
                'Brand Assets Verified.',
                'Type "help" for OS commands.'
            ]);
            const [termInput, setTermInput] = useState('');

            const terminalRef = useRef(null);
            const identity    = NEXUS_DATA.identity.name;

            // ── Arcade node map (Updated for v14.0) ──────────────────────────────
            const arcadeNodes = [
                { id: 'tpa_node',     name: 'Tampa HQ',     x: '20%', y: '40%', type: 'hub',     icon: MapPin,   color: '#3b82f6' },
                { id: 'match3_node',  name: 'Stellara Grid',x: '45%', y: '30%', type: 'game',    icon: Gamepad2, color: '#fbbf24' },
                { id: 'neon_node',    name: 'Neon Leap',    x: '70%', y: '50%', type: 'game',    icon: Rocket,   color: '#0ea5e9' },
                { id: 'mystery_node', name: 'Seven Stars',  x: '50%', y: '75%', type: 'mystery', icon: Star,     color: '#fbbf24' },
                { id: 'mnl_gateway',  name: 'Manila B06',   x: '80%', y: '25%', type: 'hub',     icon: Globe,    color: '#8b5cf6' }
            ];

            // ── Firebase auth ────────────────────────────────────────────────────
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.warn('Auth:', err.message);
                    }
                };
                initAuth();
                const unsub = auth.onAuthStateChanged(setUser);
                return () => unsub();
            }, []);

            // ── Battery API (progressive enhancement – deprecated in some browsers) ──
            useEffect(() => {
                if (!navigator.getBattery) return;
                navigator.getBattery().then(bat => {
                    const update = () => setBattery(Math.round(bat.level * 100));
                    update();
                    bat.addEventListener('levelchange', update);
                    return () => bat.removeEventListener('levelchange', update);
                });
            }, []);

            // ── Auto-scroll terminal ─────────────────────────────────────────────
            useEffect(() => {
                if (terminalRef.current) {
                    terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
                }
            }, [terminalHistory]);

            // ── Terminal helpers ─────────────────────────────────────────────────
            const logTerm = (msg) => setTerminalHistory(prev => [...prev, `> ${msg}`]);

            const runCommand = (cmd) => {
                const clean = cmd.toLowerCase().trim();
                if (!clean) return;
                logTerm(clean);
                switch (clean) {
                    case 'help':
                        logTerm("Cmds: stats, map, bio, clear, brand");
                        break;
                    case 'stats':
                        logTerm(`XP: ${points} | Nodes: ${unlockedNodes.length}`);
                        break;
                    case 'map':
                        setView('overworld');
                        logTerm("Switching to Overworld view...");
                        break;
                    case 'clear':
                        setTerminalHistory(['[GAMIFIED LEARNING] System Reset.']);
                        break;
                    case 'brand':
                        logTerm("Logos A, B, C logged. Shield identity active.");
                        break;
                    case 'whoami':
                        logTerm("Guardian 82 // Gamified Learning Architect // Stellara Candidate");
                        break;
                    case 'bio':
                        logTerm("Managing technical debt through Stellara-inspired automation.");
                        break;
                    case 'unlock':
                        unlockFeature('neon_node');
                        break;
                    default:
                        logTerm(`Command not recognized: ${clean}`);
                }
                setTermInput('');
            };

            const unlockFeature = (id) => {
                if (!unlockedNodes.includes(id)) {
                    setUnlockedNodes(prev => [...prev, id]);
                    setCertificates(prev => [...prev, `Cert_${id.toUpperCase()}`]);
                    setPoints(prev => prev + 500);
                    logTerm(`SECURITY ALERT: Node ${id} successfully unlocked.`);
                }
            };

            // ── View: Overworld Map ──────────────────────────────────────────────
            const OverworldMap = () => (
                <div className="flex-1 relative bg-[#020617] overflow-hidden flex flex-col items-center justify-center p-4 animate-in fade-in">
                    {/* Dot-grid background */}
                    <div
                        className="absolute inset-0 opacity-10 pointer-events-none"
                        style={{
                            backgroundImage: 'radial-gradient(#3b82f6 1px, transparent 1px)',
                            backgroundSize: '30px 30px'
                        }}
                    />

                    {/* Map canvas */}
                    <div className="relative w-full max-w-lg aspect-square glass rounded-[3rem] border border-blue-500/20 flex items-center justify-center overflow-hidden shadow-[0_0_50px_rgba(59,130,246,0.1)]">
                        <div className="absolute top-8 w-full text-center">
                            <span className="text-[10px] text-blue-500 font-black uppercase tracking-[0.6em] animate-pulse">Stellara_Overworld_Map</span>
                        </div>

                        {arcadeNodes.map(node => {
                            const isUnlocked = unlockedNodes.includes(node.id);
                            const NodeIcon = node.icon;
                            const handleClick = () => {
                                if (!isUnlocked) { logTerm("Node is encrypted."); return; }
                                if (node.type === 'hub') setView('workspace');
                                else if (node.type === 'game') setView('arcade');
                                else if (node.type === 'mystery') setView('downloads');
                                else setView('terminal');
                            };
                            return (
                                <div
                                    key={node.id}
                                    className="absolute transform -translate-x-1/2 -translate-y-1/2 transition-all duration-700 cursor-pointer hover:scale-110"
                                    style={{ left: node.x, top: node.y }}
                                    onClick={handleClick}
                                >
                                    <div className="relative flex flex-col items-center group">
                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center border transition-all ${isUnlocked ? 'bg-black/80 border-blue-500 shadow-[0_0_15px_#3b82f650]' : 'bg-slate-950 border-white/5 opacity-40 grayscale scale-90'}`}>
                                            {node.id === 'match3_node' 
                                                ? <Gamepad2 size={24} color="#fbbf24" className={isUnlocked ? "animate-pulse" : ""} />
                                                : <NodeIcon size={22} color={isUnlocked ? node.color : '#1e293b'} />
                                            }
                                        </div>
                                        <span className={`mt-2 text-[8px] font-black uppercase tracking-widest whitespace-nowrap px-2 py-1 rounded bg-black/80 border border-white/5 ${isUnlocked ? 'text-white' : 'text-slate-700'}`}>
                                            {node.name}
                                        </span>
                                        {isUnlocked && (
                                            <div className="absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full animate-ping pointer-events-none" />
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Telemetry cards */}
                    <div className="mt-8 flex gap-4 overflow-x-auto w-full px-4 no-scrollbar">
                        <div className="flex-shrink-0 w-40 glass p-4 rounded-3xl border border-white/5 space-y-2">
                            <span className="text-[8px] text-slate-500 uppercase font-black tracking-widest">Active_Telemetry</span>
                            <div className="flex justify-between items-end">
                                <span className="text-xl font-black text-white">{points}</span>
                                <span className="text-[9px] text-emerald-500 font-bold mb-1">XP</span>
                            </div>
                        </div>
                        <div className="flex-shrink-0 w-40 glass p-4 rounded-3xl border border-white/5 space-y-2">
                            <span className="text-[8px] text-slate-500 uppercase font-black tracking-widest">Mystery_Progress</span>
                            <div className="flex justify-between items-end">
                                <span className="text-xl font-black text-white">{Math.round((unlockedNodes.length / arcadeNodes.length) * 100)}%</span>
                                <span className="text-[9px] text-blue-500 font-bold mb-1">SYNC</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // ── View: Arcade Terminal ────────────────────────────────────────────
            const ArcadeTerminal = () => (
                <div className="flex-1 flex flex-col p-6 space-y-4 animate-in fade-in pb-32">
                    <div className="flex items-center gap-3">
                        <TerminalSquare size={20} className="text-blue-500" />
                        <h2 className="text-white font-black text-xs uppercase tracking-widest">OS_Terminal</h2>
                    </div>
                    <div className="flex-1 bg-black/90 rounded-[2.5rem] border border-blue-500/20 p-6 font-mono text-[11px] flex flex-col shadow-2xl backdrop-blur-3xl overflow-hidden">
                        <div ref={terminalRef} className="flex-1 overflow-y-auto custom-scroll space-y-1 mb-4 pr-2">
                            {terminalHistory.map((line, i) => (
                                <div key={i} className={line.startsWith('>') ? 'text-blue-400' : 'text-blue-500/70 italic'}>
                                    {line}
                                </div>
                            ))}
                        </div>
                        <div className="flex items-center gap-3 border-t border-white/5 pt-4">
                            <span className="text-blue-600 font-black">guardian@gamified:~$</span>
                            <input
                                autoFocus
                                value={termInput}
                                onChange={(e) => setTermInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && runCommand(termInput)}
                                className="flex-1 bg-transparent border-none outline-none text-white font-mono"
                                placeholder="..."
                            />
                        </div>
                    </div>
                </div>
            );

            // ── View: Stellara Match-3 Game ──────────────────────────────────────
            const StellaraGrid = () => {
                const gridWidth = 8;
                const [board, setBoard] = useState([]);
                const [selectedTile, setSelectedTile] = useState(null);
                const [score, setScore] = useState(0);

                // Initialize random 8x8 board (avoiding initial matches)
                useEffect(() => {
                    const generateBoard = () => {
                        const newBoard = [];
                        for (let i = 0; i < 64; i++) {
                            let tile;
                            do {
                                tile = Math.floor(Math.random() * 6);
                            } while (
                                // Avoid horizontal matches
                                (i % gridWidth >= 2 && 
                                 newBoard[i - 1] === tile && 
                                 newBoard[i - 2] === tile) ||
                                // Avoid vertical matches
                                (i >= gridWidth * 2 && 
                                 newBoard[i - gridWidth] === tile && 
                                 newBoard[i - gridWidth * 2] === tile)
                            );
                            newBoard.push(tile);
                        }
                        return newBoard;
                    };
                    setBoard(generateBoard());
                }, []);

                const handleTileClick = (index) => {
                    if (selectedTile === null) {
                        setSelectedTile(index);
                    } else {
                        // Check adjacency with row boundary handling
                        const selectedRow = Math.floor(selectedTile / gridWidth);
                        const indexRow = Math.floor(index / gridWidth);
                        const isHorizontalAdjacent = 
                            selectedRow === indexRow && 
                            (index === selectedTile - 1 || index === selectedTile + 1);
                        const isVerticalAdjacent = 
                            index === selectedTile - gridWidth || 
                            index === selectedTile + gridWidth;
                        const isAdjacent = isHorizontalAdjacent || isVerticalAdjacent;

                        if (isAdjacent) {
                            // Store indices before clearing selection
                            const tileA = selectedTile;
                            const tileB = index;
                            
                            // Swap logic
                            const newBoard = [...board];
                            [newBoard[tileA], newBoard[tileB]] = [newBoard[tileB], newBoard[tileA]];
                            setBoard(newBoard);
                            setSelectedTile(null);
                            
                            // Simulation of a match processing (Visual feedback + Score)
                            setTimeout(() => {
                                setScore(s => s + 150);
                                setPoints(p => p + 15);
                                // Simulate falling tiles after match
                                const refreshedBoard = [...newBoard];
                                refreshedBoard[tileA] = Math.floor(Math.random() * 6);
                                refreshedBoard[tileB] = Math.floor(Math.random() * 6);
                                setBoard(refreshedBoard);
                            }, 400);
                        } else {
                            setSelectedTile(index);
                        }
                    }
                };

                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 animate-in fade-in pb-32">
                        <div className="text-center mb-8">
                            <h2 className="text-4xl font-black text-white uppercase tracking-tighter">Stellara_Grid</h2>
                            <div className="flex items-center justify-center gap-3 mt-2">
                                <span className="text-[10px] text-amber-500 uppercase tracking-[0.4em] font-bold bg-amber-500/10 px-4 py-1 rounded-full border border-amber-500/20">Session Score: {score}</span>
                            </div>
                        </div>

                        {/* 8x8 MATCH-3 GRID */}
                        <div className="bg-[#0f172a] p-3 rounded-[2rem] border border-slate-700 shadow-2xl relative">
                            <div className="grid grid-cols-8 gap-1 md:gap-2" style={{width: '340px', height: '340px'}}>
                                {board.map((tileType, i) => {
                                    const TileComponent = TileSVGs[tileType];
                                    const isSelected = selectedTile === i;
                                    return (
                                        <div 
                                            key={i} 
                                            onClick={() => handleTileClick(i)}
                                            className={`
                                                relative flex items-center justify-center bg-slate-800/80 rounded-xl cursor-pointer
                                                border-2 transition-all duration-200 shadow-inner overflow-hidden
                                                ${isSelected ? 'border-amber-400 scale-110 z-10' : 'border-slate-700 hover:border-slate-500'}
                                            `}
                                        >
                                            {TileComponent && (
                                                <div className={`w-3/4 h-3/4 transition-transform duration-300 ${isSelected ? 'animate-pulse' : ''}`}>
                                                    <TileComponent />
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <p className="text-[9px] text-slate-500 uppercase tracking-widest mt-8 italic text-center max-w-xs">
                            Tap a tile, then tap an adjacent tile to initiate swap and align the Stellara sequence.
                        </p>
                    </div>
                );
            };

            // ── View: Downloads / Vault ──────────────────────────────────────────
            const DownloadsView = () => (
                <div className="flex-1 p-8 overflow-y-auto custom-scroll animate-in fade-in pb-32">
                    <h2 className="text-4xl font-black text-white uppercase tracking-tighter mb-12">Vault_Downloads</h2>
                    <div className="grid grid-cols-1 gap-6">
                        {certificates.length > 0 ? certificates.map((cert, i) => (
                            <div key={i} className="p-8 bg-slate-900/40 rounded-[2.5rem] border border-emerald-500/20 flex items-center justify-between group">
                                <div className="flex items-center gap-6">
                                    <div className="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center border border-emerald-500/20">
                                        <CheckCircle2 size={28} className="text-emerald-500" />
                                    </div>
                                    <div>
                                        <h4 className="text-xl font-black text-white uppercase">{cert}</h4>
                                        <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Sovereign Proficiency Shard</p>
                                    </div>
                                </div>
                                <button className="w-12 h-12 bg-emerald-600 text-black rounded-xl flex items-center justify-center active:scale-90 transition-all">
                                    <Download size={20} />
                                </button>
                            </div>
                        )) : (
                            <div className="text-center p-20 glass rounded-[3rem] border border-dashed border-white/10">
                                <AlertTriangle size={48} className="text-slate-800 mx-auto mb-6" />
                                <p className="text-xs text-slate-600 uppercase font-black tracking-widest">No Certificates Unlocked</p>
                                <button
                                    onClick={() => unlockFeature('mystery_node')}
                                    className="mt-6 text-[10px] text-blue-500 font-black uppercase hover:underline"
                                >Force_Sync_Certificates?</button>
                            </div>
                        )}
                    </div>
                </div>
            );

            // ── View: Profile ────────────────────────────────────────────────────
            const ProfileView = () => (
                <div className="flex-1 p-8 overflow-y-auto custom-scroll animate-in zoom-in pb-32">
                    <div className="max-w-xl mx-auto space-y-10">
                        <div className="flex flex-col items-center space-y-6">
                            <div className="w-36 h-36 bg-slate-950 rounded-[3rem] flex items-center justify-center border-2 border-blue-500/30 shadow-[0_0_60px_#3b82f615]">
                                <GamifiedLogo size={72} />
                            </div>
                            <div className="text-center space-y-2">
                                <h2 className="text-4xl font-black text-white uppercase tracking-tighter leading-none">{identity}</h2>
                                <span className="text-[10px] text-blue-500 font-black uppercase tracking-[0.4em]">{NEXUS_DATA.identity.rank}</span>
                            </div>
                        </div>

                        <div className="bg-slate-900/40 p-10 rounded-[3rem] border border-white/5 space-y-8 shadow-2xl">
                            <div className="space-y-4">
                                <span className="text-[8px] text-slate-600 font-black uppercase tracking-widest">Mission Statement</span>
                                <p className="text-[11px] text-slate-400 leading-relaxed">{NEXUS_DATA.identity.bio}</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-5 bg-black/40 rounded-3xl border border-white/5 text-center">
                                    <span className="text-[8px] text-slate-600 font-black uppercase block mb-1">Local Node</span>
                                    <span className="text-[10px] text-white font-bold uppercase">Tampa / B10</span>
                                </div>
                                <div className="p-5 bg-black/40 rounded-3xl border border-white/5 text-center">
                                    <span className="text-[8px] text-slate-600 font-black uppercase block mb-1">Arcade Rank</span>
                                    <span className="text-[10px] text-white font-bold uppercase">S-Class</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // ── View: Workspace / Brand Vault ────────────────────────────────────
            const WorkspaceView = () => (
                <div className="flex-1 p-8 overflow-y-auto custom-scroll animate-in fade-in pb-32">
                    <h2 className="text-4xl font-black text-white uppercase tracking-tighter italic leading-none mb-8">Brand_Vault</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Logo Concepts */}
                        <div className="glass p-8 rounded-[3rem] border border-white/5 space-y-6">
                            <div className="flex items-center gap-3">
                                <ShieldCheck size={20} className="text-amber-500" />
                                <span className="text-xs font-black text-white uppercase tracking-widest">Logo_Concepts_Logged</span>
                            </div>
                            <div className="space-y-4">
                                <div className="p-4 bg-black/40 border border-amber-500/20 rounded-2xl flex justify-between items-center">
                                    <span className="text-[10px] font-black text-amber-500 uppercase">A. Gold Classic Shield</span>
                                    <CheckCircle2 size={14} className="text-emerald-500" />
                                </div>
                                <div className="p-4 bg-blue-900/20 border border-blue-500/40 rounded-2xl flex justify-between items-center shadow-[0_0_15px_#3b82f630]">
                                    <span className="text-[10px] font-black text-blue-400 uppercase">B. Modern Blue/Silver (Active)</span>
                                    <CheckCircle2 size={14} className="text-emerald-500" />
                                </div>
                                <div className="p-4 bg-black/40 border border-white/10 rounded-2xl flex justify-between items-center">
                                    <span className="text-[10px] font-black text-slate-400 uppercase">C. Pixel Art Shield</span>
                                    <CheckCircle2 size={14} className="text-emerald-500" />
                                </div>
                            </div>
                        </div>

                        {/* DevOps Tools */}
                        <div className="glass p-8 rounded-[3rem] border border-white/5 space-y-6">
                            <div className="flex items-center gap-3">
                                <Layout size={18} className="text-amber-500" />
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] text-white">Handshake_Tools</span>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <a
                                    href="https://script.google.com/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="p-4 bg-black/40 rounded-2xl border border-white/5 hover:border-blue-500/30 flex items-center gap-3 transition-all"
                                >
                                    <Code2 size={16} className="text-slate-400" />
                                    <span className="text-[9px] font-black text-white uppercase">Apps Script</span>
                                </a>
                                <a
                                    href="https://sites.google.com/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="p-4 bg-black/40 rounded-2xl border border-white/5 hover:border-blue-500/30 flex items-center gap-3 transition-all"
                                >
                                    <Layout size={16} className="text-slate-400" />
                                    <span className="text-[9px] font-black text-white uppercase">Google Sites</span>
                                </a>
                                <a
                                    href="https://github.com/NicholaiMM/gamifiedlearning.github.io"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="p-4 bg-black/40 rounded-2xl border border-white/5 hover:border-blue-500/30 flex items-center gap-3 transition-all"
                                >
                                    <Code2 size={16} className="text-slate-400" />
                                    <span className="text-[9px] font-black text-white uppercase">GitHub</span>
                                </a>
                                <a
                                    href="https://docs.google.com/document/d/1Md7lJvMgfmIgyqhg_uIc792TLI98rWkWDIRnqFm0vJk/edit"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="p-4 bg-black/40 rounded-2xl border border-white/5 hover:border-blue-500/30 flex items-center gap-3 transition-all"
                                >
                                    <FileText size={16} className="text-slate-400" />
                                    <span className="text-[9px] font-black text-white uppercase">Resume</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // ── Root render ──────────────────────────────────────────────────────
            return (
                <div className="fixed inset-0 bg-[#020617] text-slate-400 flex flex-col selection:bg-blue-500/30 overflow-hidden font-sans">

                    {/* BRANDED HEADER */}
                    <nav className="h-16 border-b border-white/5 bg-black/95 flex items-center justify-between px-6 z-[100] backdrop-blur-3xl shadow-lg">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('overworld')}>
                            <GamifiedLogo size={36} />
                            <div className="flex flex-col">
                                <h1 className="text-white font-black text-[11px] uppercase tracking-[0.3em] leading-none">Gamified_Learning.org</h1>
                                <span className="text-[8px] text-blue-500 font-bold uppercase tracking-widest mt-1">OS v{NEXUS_DATA.version} // Stellara</span>
                            </div>
                        </div>
                        <div className="hidden md:flex items-center gap-4">
                            <span className="text-[10px] text-slate-400 font-mono uppercase">XP: {points}</span>
                        </div>
                    </nav>

                    {/* VIEWPORT */}
                    <main className="flex-1 relative flex overflow-hidden w-full h-full pb-20">
                        {view === 'overworld' && <OverworldMap />}
                        {view === 'arcade' && <StellaraGrid />}
                        {view === 'terminal' && <ArcadeTerminal />}
                        {view === 'downloads' && <DownloadsView />}
                        {view === 'profile' && <ProfileView />}
                        {view === 'workspace' && <WorkspaceView />}
                    </main>

                    {/* MOBILE THUMB DOCK */}
                    <div className="h-20 border-t border-white/5 bg-black/95 flex items-center justify-around px-4 z-[80] backdrop-blur-2xl flex-shrink-0">
                        <NavBtn active={view === 'overworld'} icon={MapIcon} label="Map" onClick={() => setView('overworld')} />
                        <NavBtn active={view === 'arcade'} icon={Gamepad2} label="Arcade" onClick={() => setView('arcade')} />
                        <NavBtn active={view === 'terminal'} icon={TermIcon} label="Terminal" onClick={() => setView('terminal')} />
                        <NavBtn active={view === 'downloads'} icon={Download} label="Vault" onClick={() => setView('downloads')} />
                        <NavBtn active={view === 'profile'} icon={User} label="Profile" onClick={() => setView('profile')} />
                    </div>
                </div>
            );
        };

        // ─── Mount ────────────────────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // ─── Error Boundary ───────────────────────────────────────────────────────
        window.onerror = (msg, url, lineNo, columnNo, error) => {
            console.error('Application Error:', { msg, url, lineNo, columnNo, error });
            return false;
        };
        
        window.onunhandledrejection = (event) => {
            console.error('Unhandled Promise Rejection:', event.reason);
        };
    </script>
    
    <!-- Service Worker Registration (for PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Service worker can be added for offline support
                // navigator.serviceWorker.register('/sw.js');
                console.log('[Gamified Learning] PWA-ready environment detected');
            });
        }
        
        // Performance monitoring
        if ('performance' in window) {
            window.addEventListener('load', () => {
                setTimeout(() => {
                    const perfData = performance.getEntriesByType('navigation')[0];
                    if (perfData) {
                        console.log(`[Gamified Learning] Page load: ${Math.round(perfData.loadEventEnd)}ms`);
                    }
                }, 0);
            });
        }
    </script>
</body>
</html>
